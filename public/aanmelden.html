<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aanmelden Mailinglist - Haagse Open Mic</title>

    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=2">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'media', // Luistert automatisch naar de telefoon instellingen (Light/Dark mode)
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: { blue: '#0071e3' }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="antialiased min-h-screen flex items-center justify-center font-sans bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-4">

    <!-- Main Card -->
    <div
        class="bg-white dark:bg-gray-800 w-full max-w-md p-8 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700">

        <!-- Header Section -->
        <div class="text-center mb-8">
            <img src="/logo.png" alt="Haagse Open Mic Logo" id="hom-header-logo">
            <h1 class="text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-2">Haagse Open Mic</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">Blijf op de hoogte van onze volgende edities en mis
                nooit een avond vol talent!</p>
        </div>

        <!-- Form Container -->
        <div id="form-container">
            <form id="subscribe-form" class="space-y-4">
                <div>
                    <label for="firstName"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Voornaam</label>
                    <input type="text" id="firstName" name="firstName" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 focus:bg-white dark:focus:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-apple-blue/50 transition-all text-base"
                        placeholder="Bijv. John">
                </div>

                <div>
                    <label for="lastName"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Achternaam</label>
                    <input type="text" id="lastName" name="lastName" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 focus:bg-white dark:focus:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-apple-blue/50 transition-all text-base"
                        placeholder="Bijv. Doe">
                </div>

                <div>
                    <label for="email"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mailadres</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 focus:bg-white dark:focus:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-apple-blue/50 transition-all text-base"
                        placeholder="jouw@email.nl">
                </div>

                <!-- Error Message -->
                <p id="error-msg"
                    class="hidden text-red-500 text-sm font-medium text-center bg-red-50 dark:bg-red-900/20 p-3 rounded-lg">
                </p>

                <button type="submit" id="submit-btn"
                    class="w-full bg-apple-blue hover:bg-blue-600 text-white font-medium py-3.5 px-4 rounded-xl transition-all shadow-md active:scale-[0.98] flex justify-center items-center mt-6">
                    Aanmelden
                </button>
            </form>
        </div>

        <!-- Success Message (Hidden by default) -->
        <div id="success-msg" class="hidden text-center py-6">
            <div
                class="bg-green-100 dark:bg-green-900/30 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check" class="text-green-600 dark:text-green-400 w-8 h-8"></i>
            </div>
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">Bedankt voor je aanmelding!</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm">Je staat nu op de mailinglijst. We houden je op de
                hoogte!</p>
        </div>

    </div>

    <script>
        // Activeer Lucide iconen
        lucide.createIcons();

        // Form afhandeling
        document.getElementById('subscribe-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');

            const payload = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim()
            };

            // UI Update: Laden
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2"></i> Even geduld...';
            lucide.createIcons();
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/public-subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // UI Update: Succes
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-msg').classList.remove('hidden');
                } else {
                    throw new Error(result.message || 'Server reageerde met een fout.');
                }
            } catch (error) {
                // UI Update: Fout
                console.error('Fout bij aanmelden:', error);
                errorMsg.textContent = 'Er ging iets mis, probeer het later nog eens.';
                errorMsg.classList.remove('hidden');

                btn.disabled = false;
                btn.innerHTML = 'Aanmelden';
            }
        });
    </script>
</body>

</html>
