<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haagse Open Mic - Artiesten Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: { gray: '#f5f5f7', border: '#e5e5ea', text: '#1d1d1f', blue: '#0071e3' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="antialiased h-screen flex flex-col font-sans overflow-hidden bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200 text-[16px] md:text-sm">

    <header id="main-header"
        class="glass-header fixed top-0 w-full z-30 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-all duration-300 overflow-x-auto scrollbar-hide">
        <div class="flex justify-between items-center px-4 md:px-8 py-4 md:py-5 min-w-max w-full">
            <div class="flex items-center gap-2 md:gap-3 mr-4 md:mr-8">
            <div class="bg-apple-blue p-2 rounded-lg text-white shadow-sm">
                <i data-lucide="mic-2" class="w-5 h-5"></i>
            </div>
            <h1 class="text-lg md:text-xl font-semibold tracking-tight text-gray-900 dark:text-white">Haagse Open Mic</h1>
        </div>
        <div class="flex items-center gap-2 md:gap-3">
            <div class="relative">
                <i data-lucide="search"
                    class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                <input type="text" id="search-input" placeholder="Zoek op naam, act of e-mail..."
                    class="pl-9 pr-4 py-2 min-h-[44px] border border-gray-200 dark:border-gray-700 rounded-full text-base md:text-sm focus:outline-none focus:ring-2 focus:ring-apple-blue/50 w-48 md:w-64 lg:w-72 bg-white dark:bg-gray-800 dark:text-white dark:placeholder-gray-400 transition-all">
            </div>

            <button id="btn-toggle-theme" data-action="toggleTheme"
                class="p-2 min-h-[44px] min-w-[44px] flex items-center justify-center text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors rounded-full hover:bg-gray-100 dark:hover:bg-gray-800"
                title="Toggle Dark Mode">
                <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
            </button>

            <button id="btn-open-settings" data-action="openSettings"
                class="p-2 min-h-[44px] min-w-[44px] flex items-center justify-center text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors rounded-full hover:bg-gray-100 dark:hover:bg-gray-800" title="Instellingen">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>

            <button id="btn-open-sync" data-action="openSync"
                class="min-h-[44px] bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 px-4 py-2 rounded-full text-base md:text-sm font-medium transition-colors shadow-sm flex items-center gap-2"
                title="Haal nieuwe contacten uit je adresboek">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync
            </button>

            <button id="btn-open-mailing" data-action="openMailing" class="min-h-[44px] bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 px-4 py-2 rounded-full text-base md:text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <i data-lucide="mail" class="w-4 h-4"></i> Mailing
            </button>

            <button id="btn-open-lineup" data-action="openLineup" class="min-h-[44px] bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 px-4 py-2 rounded-full text-base md:text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <i data-lucide="list-ordered" class="w-4 h-4"></i> Speelschema
            </button>

            <button id="btn-open-photo" data-action="openPhoto" class="min-h-[44px] bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 px-4 py-2 rounded-full text-base md:text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <i data-lucide="camera" class="w-4 h-4"></i> Foto's
            </button>

            <button id="btn-open-add" data-action="openAddContact"
                class="min-h-[44px] bg-apple-blue hover:bg-blue-600 text-white px-5 py-2 rounded-full text-base md:text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> Nieuw Contact
            </button>
        </div>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto overflow-y-auto p-4 md:p-8 relative">
        <div class="max-w-[1500px] mx-auto">

            <div class="flex flex-wrap items-center gap-3 mb-4 md:mb-6">
                <select id="filter-region" class="min-h-[44px] border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-lg px-3 py-2 text-base md:text-sm font-medium text-gray-600 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-apple-blue/50">
                    <option value="all">Alle Regio's</option>
                    <option value="Den Haag">Den Haag</option>
                    <option value="Rotterdam">Rotterdam</option>
                </select>
                <select id="filter-type" class="min-h-[44px] border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-lg px-3 py-2 text-base md:text-sm font-medium text-gray-600 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-apple-blue/50">
                    <option value="all">Alle Types</option>
                    <option value="Artiest">Artiest</option>
                    <option value="Bobo">Bobo</option>
                    <option value="Supplier">Supplier</option>
                    <option value="Publiek">Publiek</option>
                </select>
                <select id="filter-bookable" class="min-h-[44px] border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-lg px-3 py-2 text-base md:text-sm font-medium text-gray-600 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-apple-blue/50">
                    <option value="all">Boekbaar: Alle</option>
                    <option value="ja">Boekbaar: Ja</option>
                    <option value="nee">Boekbaar: Nee</option>
                </select>

                <div class="ml-auto text-sm text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 px-4 py-2 min-h-[44px] rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm flex items-center gap-2">
                    Gevonden: <span id="contact-count" class="font-semibold text-apple-blue text-base">0</span>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 table-container overflow-x-auto min-h-[400px] relative transition-colors">
                <div id="loading-state" class="absolute inset-0 bg-white/80 dark:bg-gray-900/80 z-10 flex flex-col items-center justify-center backdrop-blur-sm">
                    <div class="w-10 h-10 border-4 border-gray-200 dark:border-gray-600 rounded-full loader mb-4"></div>
                    <p class="text-sm font-medium text-gray-500">Contacten ophalen uit Google Sheets...</p>
                </div>
                <div id="empty-state" class="hidden absolute inset-0 bg-white dark:bg-gray-800 z-0 flex flex-col items-center justify-center">
                    <i data-lucide="users" class="w-12 h-12 text-gray-300 mb-3"></i>
                    <p class="text-sm font-medium text-gray-500">Geen contacten gevonden voor deze filters.</p>
                </div>

                <table class="w-full text-left border-collapse min-w-[1250px]">
                    <thead>
                        <tr class="bg-gray-50/50 dark:bg-gray-700/50 text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wider border-b border-gray-200 dark:border-gray-700">
                        <th class="px-3 md:px-4 py-4 font-semibold w-12 text-center"><input type="checkbox" id="select-all-mailing" class="rounded text-apple-blue focus:ring-apple-blue w-5 h-5 md:w-4 md:h-4 cursor-pointer" onchange="window.toggleAllMailingSelection(this.checked)"></th>
                        <th class="px-4 md:px-6 py-4 font-semibold w-1/6">Naam & Act</th>
                        <th class="px-4 md:px-6 py-4 font-semibold w-1/6">Contact</th>
                        <th class="px-4 md:px-6 py-4 font-semibold w-1/8">Type & Regio</th>
                        <th class="px-4 md:px-6 py-4 font-semibold w-1/6">Details</th>
                        <th class="px-4 md:px-6 py-4 font-semibold w-1/6">Status / Favs</th>
                        <th class="px-4 md:px-6 py-4 font-semibold w-1/6">Notities</th>
                        <th class="px-4 md:px-6 py-4 font-semibold text-right min-w-[120px]">Acties</th>
                        </tr>
                    </thead>
                    <tbody id="artist-table-body" class="text-sm divide-y divide-gray-100 dark:divide-gray-700">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Scroll to Top Button -->
    <button id="btn-scroll-top"
        class="fixed bottom-6 right-6 md:bottom-8 md:right-8 p-3 min-h-[44px] min-w-[44px] bg-apple-blue text-white rounded-full shadow-lg hover:bg-blue-600 transition-all duration-300 z-40 opacity-0 pointer-events-none translate-y-4 flex items-center justify-center"
        title="Terug naar boven">
        <i data-lucide="arrow-up" class="w-5 h-5"></i>
    </button>

    <!-- Pull to Refresh Indicator -->
    <div id="ptr-container" class="fixed top-0 left-0 w-full flex justify-center z-40 pt-4" style="transform: translateY(-100%); transition: transform 0.2s ease-out; pointer-events: none;">
        <div class="bg-white dark:bg-gray-800 shadow-lg border border-gray-200 dark:border-gray-700 rounded-full px-4 py-2 flex items-center gap-2">
            <svg id="ptr-spinner" class="w-4 h-4 text-apple-blue hidden animate-spin" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            <svg id="ptr-arrow" class="w-4 h-4 text-apple-blue transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
            <span id="ptr-text" class="text-sm font-medium text-gray-600 dark:text-gray-300">Trek omlaag...</span>
        </div>
    </div>

    <script type="module" src="main.js"></script>

    <script>
        // Smart Header Hide/Show on Scroll
        document.addEventListener("DOMContentLoaded", () => {
            const main = document.querySelector('main');
            const header = document.querySelector('header');
            const scrollTopBtn = document.getElementById('btn-scroll-top');
            let lastScrollY = main.scrollTop;

            const updatePadding = () => {
                const isDesktop = window.innerWidth >= 768;
                const basePadding = isDesktop ? 32 : 16; // Komt overeen met originele p-4 of md:p-8 padding
                main.style.paddingTop = `${header.offsetHeight + basePadding}px`;
            };
            
            setTimeout(updatePadding, 100);
            window.addEventListener('resize', updatePadding);

            main.addEventListener('scroll', () => {
                const currentScrollY = Math.max(0, main.scrollTop); // Math.max vangt iOS 'rubber-banding' op
                const isInputFocused = document.activeElement && header.contains(document.activeElement);
                
                if (currentScrollY <= 0) {
                    header.style.transform = 'translateY(0)';
                } else if (!isInputFocused && currentScrollY > lastScrollY && currentScrollY > header.offsetHeight) {
                    header.style.transform = 'translateY(-100%)'; // Omlaag scrollen -> verberg menu
                } else if (currentScrollY < lastScrollY) {
                    header.style.transform = 'translateY(0)'; // Omhoog scrollen -> toon menu
                }
                
                // Toggle scroll-to-top button
                if (currentScrollY > 300) {
                    scrollTopBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                    scrollTopBtn.classList.add('opacity-100', 'translate-y-0');
                } else {
                    scrollTopBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                    scrollTopBtn.classList.remove('opacity-100', 'translate-y-0');
                }
                
                lastScrollY = currentScrollY;
            });
        });
        
        // Smooth scroll to top actie
        scrollTopBtn.addEventListener('click', () => {
            main.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Pull to Refresh Logica
        const ptrContainer = document.getElementById('ptr-container');
        const ptrArrow = document.getElementById('ptr-arrow');
        const ptrSpinner = document.getElementById('ptr-spinner');
        const ptrText = document.getElementById('ptr-text');
        
        let ptrStartY = 0;
        let ptrCurrentY = 0;
        let ptrIsPulling = false;
        let ptrRefreshing = false;
        let ptrThresholdReached = false;
        const PTR_THRESHOLD = 70;

        main.addEventListener('touchstart', (e) => {
            // Alleen starten als we helemaal bovenaan zijn en we niet al refreshen
            if (main.scrollTop <= 0 && !ptrRefreshing) {
                ptrStartY = e.touches[0].clientY;
                ptrIsPulling = true;
                ptrThresholdReached = false;
                ptrContainer.style.transition = 'none'; // Snappy reactie tijdens slepen
            }
        }, { passive: true });

        main.addEventListener('touchmove', (e) => {
            if (!ptrIsPulling || ptrRefreshing) return;
            ptrCurrentY = e.touches[0].clientY;
            const pullDistance = ptrCurrentY - ptrStartY;
            
            // Alleen pull-to-refresh activeren als we omlaag slepen
            if (pullDistance > 0 && main.scrollTop <= 0) {
                const translateY = Math.min(pullDistance * 0.4, PTR_THRESHOLD + 20); // Geef een lichte weerstand (0.4)
                ptrContainer.style.transform = `translateY(calc(-100% + ${translateY}px))`;
                
                if (translateY >= PTR_THRESHOLD) {
                    ptrArrow.style.transform = 'rotate(180deg)';
                    ptrText.textContent = 'Laat los om te vernieuwen';
                    if (!ptrThresholdReached) {
                        ptrThresholdReached = true;
                        if (navigator.vibrate) navigator.vibrate(15); // Subtiel tikje (ca. 15ms)
                    }
                } else {
                    ptrArrow.style.transform = 'rotate(0deg)';
                    ptrText.textContent = 'Trek omlaag...';
                    ptrThresholdReached = false;
                }
            }
        }, { passive: true });

        main.addEventListener('touchend', async () => {
            if (!ptrIsPulling || ptrRefreshing) return;
            ptrIsPulling = false;
            
            const pullDistance = ptrCurrentY - ptrStartY;
            const translateY = pullDistance * 0.4;
            
            ptrContainer.style.transition = 'transform 0.3s ease-out';
            
            // Refresh actie uitvoeren als de drempel (PTR_THRESHOLD) is overschreden
            if (translateY >= PTR_THRESHOLD) {
                ptrRefreshing = true;
                ptrContainer.style.transform = `translateY(20px)`; // Houd in beeld tijdens het laden
                
                ptrArrow.classList.add('hidden');
                ptrSpinner.classList.remove('hidden');
                ptrText.textContent = 'Vernieuwen...';
                
                // Data daadwerkelijk ophalen op de achtergrond
                if (window.loadArtists) await window.loadArtists();
                
                ptrContainer.style.transform = 'translateY(-100%)';
                setTimeout(() => {
                    ptrArrow.classList.remove('hidden');
                    ptrSpinner.classList.add('hidden');
                    ptrArrow.style.transform = 'rotate(0deg)';
                    ptrText.textContent = 'Trek omlaag...';
                    ptrRefreshing = false;
                }, 300);
            } else {
                ptrContainer.style.transform = 'translateY(-100%)'; // Verberg terug als je niet ver genoeg trok
            }
            
            ptrCurrentY = 0;
            ptrStartY = 0;
        });
    </script>
</body>

</html>
