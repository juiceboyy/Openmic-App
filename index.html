<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haagse Open Mic - Artiesten Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: { gray: '#f5f5f7', border: '#e5e5ea', text: '#1d1d1f', blue: '#0071e3' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased h-screen flex flex-col font-sans overflow-hidden">

    <header class="glass-header sticky top-0 z-30 px-8 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-apple-blue p-2 rounded-lg text-white shadow-sm">
                <i data-lucide="mic-2" class="w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-semibold tracking-tight">Haagse Open Mic</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                <input type="text" id="search-input" placeholder="Zoek op naam, act of e-mail..." class="pl-9 pr-4 py-2 border border-gray-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-apple-blue/50 w-64 lg:w-72 bg-white transition-all">
            </div>
            
            <button id="btn-open-sync" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-full text-sm font-medium transition-colors shadow-sm flex items-center gap-2" title="Haal nieuwe contacten uit je adresboek">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync
            </button>

            <button id="btn-open-mailing" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-full text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <i data-lucide="mail" class="w-4 h-4"></i> Mailing
            </button>

            <button id="btn-open-photo" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-full text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <i data-lucide="camera" class="w-4 h-4"></i> Foto's
            </button>
            
            <button id="btn-open-add" class="bg-apple-blue hover:bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> Nieuw Contact
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto overflow-y-auto p-8 relative">
        <div class="max-w-[1500px] mx-auto">
            
            <div class="flex flex-wrap items-center gap-3 mb-6">
                <select id="filter-region" class="border border-gray-200 bg-white rounded-lg px-3 py-2 text-sm font-medium text-gray-600 focus:outline-none focus:ring-2 focus:ring-apple-blue/50">
                    <option value="all">Alle Regio's</option>
                    <option value="Den Haag">Den Haag</option>
                    <option value="Rotterdam">Rotterdam</option>
                </select>
                <select id="filter-type" class="border border-gray-200 bg-white rounded-lg px-3 py-2 text-sm font-medium text-gray-600 focus:outline-none focus:ring-2 focus:ring-apple-blue/50">
                    <option value="all">Alle Types</option>
                    <option value="Artiest">Artiest</option>
                    <option value="Bobo">Bobo</option>
                    <option value="Supplier">Supplier</option>
                    <option value="Publiek">Publiek</option>
                </select>
                <select id="filter-bookable" class="border border-gray-200 bg-white rounded-lg px-3 py-2 text-sm font-medium text-gray-600 focus:outline-none focus:ring-2 focus:ring-apple-blue/50">
                    <option value="all">Boekbaar: Alle</option>
                    <option value="ja">Boekbaar: Ja</option>
                    <option value="nee">Boekbaar: Nee</option>
                </select>

                <div class="ml-auto text-sm text-gray-500 bg-white px-4 py-2 rounded-lg border border-gray-200 shadow-sm flex items-center gap-2">
                    Gevonden: <span id="contact-count" class="font-semibold text-apple-blue text-base">0</span>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-gray-200 table-container overflow-x-auto min-h-[400px] relative">
                <div id="loading-state" class="absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center backdrop-blur-sm">
                    <div class="w-10 h-10 border-4 border-gray-200 rounded-full loader mb-4"></div>
                    <p class="text-sm font-medium text-gray-500">Contacten ophalen uit Google Sheets...</p>
                </div>
                <div id="empty-state" class="hidden absolute inset-0 bg-white z-0 flex flex-col items-center justify-center">
                    <i data-lucide="users" class="w-12 h-12 text-gray-300 mb-3"></i>
                    <p class="text-sm font-medium text-gray-500">Geen contacten gevonden voor deze filters.</p>
                </div>

                <table class="w-full text-left border-collapse min-w-[1250px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-200">
                            <th class="px-6 py-4 font-semibold w-1/6">Naam & Act</th>
                            <th class="px-6 py-4 font-semibold w-1/6">Contact</th>
                            <th class="px-6 py-4 font-semibold w-1/8">Type & Regio</th>
                            <th class="px-6 py-4 font-semibold w-1/6">Details</th>
                            <th class="px-6 py-4 font-semibold w-1/6">Status / Favs</th>
                            <th class="px-6 py-4 font-semibold w-1/6">Notities</th>
                            <th class="px-6 py-4 font-semibold text-right min-w-[120px]">Acties</th>
                        </tr>
                    </thead>
                    <tbody id="artist-table-body" class="text-sm divide-y divide-gray-100">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
